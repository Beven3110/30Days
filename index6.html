<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Recipies - Discipline</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #111;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: red;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 30px;
}

.btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.btn {
    display: block;
    padding: 20px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.2s;
}

.btn:hover {
    background: red;
    color: white;
    transform: scale(1.03);
}

.back-btn {
    margin-top: 30px;
    padding: 12px 20px;
    background: red;
    border: none;
    color: white;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

.back-btn:hover {
    background: #cc0000;
}
</style>
</head>

<body>

<header>DISCIPLINE</header>

<div class="container">

<div class="btn-grid">
