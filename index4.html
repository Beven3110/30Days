<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="r.png">
<title>Diet Plans - Discipline</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #111;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: red;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 30px;
}

.btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.btn {
    display: block;
    padding: 20px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.2s;
}

.btn:hover {
    background: red;
    color: white;
    transform: scale(1.03);
}

.back-btn {
    margin-top: 30px;
    padding: 12px 20px;
    background: red;
    border: none;
    color: white;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

.back-btn:hover {
    background: #cc0000;
}
</style>
</head>

<body>

<header>DISCIPLINE</header>

<div class="container">

<h1>Diet Plans</h1>

<div class="btn-grid">

<a href="https://drive.google.com/file/d/14ZKSqMTgH5ba4XQLlq4VEV4z2846P0Ze/view?usp=sharing" class="btn">2000kcal male plan</a>
<a href="https://drive.google.com/file/d/17eOaFx7nWx2hgM4xE7hPyGFjG4G-VtES/view?usp=sharing" class="btn">1800kcal female plan</a>    

<a href="https://drive.google.com/file/d/1QObLgpdfiU34eHMpfb-zWAG-29OVeluO/view?usp=sharing" class="btn">Ketogenic Plan</a>
<a href="https://drive.google.com/file/d/1rMzluLh4EVkeaBOtEdW_UinNRJKuPLev/view?usp=sharing" class="btn">Mediterranean Plan</a>

<a href="https://drive.google.com/file/d/1sF1e39oGcUU7FWT_GKBdF5h0FVYB2rWn/view?usp=sharing" class="btn">Vegan Plan</a>
<a href="https://drive.google.com/file/d/1ectNu1dSn6DTrS0WtS4liB2jOPgjWkpo/view?usp=sharing" class="btn">Paleo Plan</a>

</div>

<button class="back-btn" onclick="window.location.href='index.html'">Back</button>

</div>

</body>
</html>
